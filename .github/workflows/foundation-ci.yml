name: Foundation CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - bootstrap/foundation-v5

permissions:
  contents: read

concurrency:
  group: foundation-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundation:
    name: foundation
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Fetch exact commit without third-party actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c http.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Verify runtime
        run: |
          set -euo pipefail
          python3 --version
          python3 - <<'PY'
          import sys
          if sys.version_info < (3, 12):
              raise SystemExit(f"Python 3.12+ required, got {sys.version}")
          PY

      - name: Run Foundation checks
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 -m quantum.scripts.ci
