name: Apply R79 Bootstrap Hotfix

on:
  push:
    branches:
      - fix/quantum-one-click-stable-release
    paths:
      - .github/workflows/apply-r79-bootstrap-hotfix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/quantum-one-click-stable-release
          fetch-depth: 0

      - name: Apply deterministic bootstrap and shortcut patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json

          one_path = Path('scripts/windows/one_click_home_local.ps1')
          one = one_path.read_bytes().decode('ascii')
          old = '''if (-not $SkipInstall -and [string]::IsNullOrWhiteSpace($PackageRoot) -and [string]::IsNullOrWhiteSpace($InstalledRoot)) {
              $installedCandidate = (Resolve-Path -LiteralPath (Join-Path $PSScriptRoot "..")).Path
              $installedRuntime = Join-Path $installedCandidate "src\\quantum\\application\\desktop_center.py"
              $packageInstaller = Join-Path $installedCandidate "scripts\\install_home_local.ps1"
              if ((Test-Path -LiteralPath $installedRuntime -PathType Leaf) -and -not (Test-Path -LiteralPath $packageInstaller -PathType Leaf)) {
                  $SkipInstall = $true
                  $InstalledRoot = $installedCandidate
              }
          }
          '''.replace('\n', '\r\n')
          new = '''if (-not $SkipInstall -and [string]::IsNullOrWhiteSpace($PackageRoot) -and [string]::IsNullOrWhiteSpace($InstalledRoot)) {
              $installedCandidate = (Resolve-Path -LiteralPath (Join-Path $PSScriptRoot "..")).Path
              $packageInstaller = Join-Path $installedCandidate "scripts\\install_home_local.ps1"
              if (-not (Test-Path -LiteralPath $packageInstaller -PathType Leaf)) {
                  $SkipInstall = $true
                  $InstalledRoot = $installedCandidate
              }
          }
          '''.replace('\n', '\r\n')
          if one.count(old) != 1:
              raise SystemExit('one-click installed-mode anchor mismatch')
          one_path.write_bytes(one.replace(old, new, 1).encode('ascii'))

          installer_path = Path('scripts/windows/install_home_local.ps1')
          installer = installer_path.read_bytes().decode('ascii')
          start = installer.index('function New-QuantumShortcut {')
          end = installer.index('\r\nfunction Get-PortablePath {', start)
          shortcut_function = r'''function New-QuantumShortcut {
              param([string]$Launcher, [string]$WorkingDirectory)
              try {
                  $currentName = Get-QuantumRussianText -Encoded "0KbQtdC90YLRgCDRgNC10YjQtdC90LjQuSBRdWFudHVt"
                  $legacyRussianName = Get-QuantumRussianText -Encoded "UXVhbnR1bSDigJQg0JDQvdCw0LvQuNC3INC+0YLRh9GR0YLQvtCyIFdC"
                  $knownNames = @($currentName, $legacyRussianName, "Quantum Analytics", "Quantum")
                  $desktopCandidates = @([Environment]::GetFolderPath("Desktop"), (Join-Path $env:USERPROFILE "Desktop"))
                  if (-not [string]::IsNullOrWhiteSpace($env:OneDrive)) {
                      $desktopCandidates += (Join-Path $env:OneDrive "Desktop")
                  }
                  $desktops = @($desktopCandidates | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -Unique)
                  $shell = New-Object -ComObject WScript.Shell
                  $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
                  $primaryShortcut = $null

                  function Set-QuantumShortcut {
                      param([Parameter(Mandatory = $true)][string]$Path)
                      $shortcut = $shell.CreateShortcut($Path)
                      $shortcut.TargetPath = $Launcher
                      $shortcut.Arguments = ""
                      $shortcut.WorkingDirectory = $WorkingDirectory
                      $shortcut.Description = Get-QuantumRussianText -Encoded "0KbQtdC90YLRgCDRgNC10YjQtdC90LjQuSBRdWFudHVtIOKAlCDQu9C+0LrQsNC70YzQvdGL0Lkg0LfQsNC/0YPRgdC6"
                      $shortcut.IconLocation = "$env:SystemRoot\\System32\\shell32.dll,167"
                      $shortcut.Save()
                  }

                  foreach ($desktop in $desktops) {
                      if (-not (Test-Path -LiteralPath $desktop -PathType Container)) { continue }
                      $currentPath = Join-Path $desktop ($currentName + ".lnk")
                      Set-QuantumShortcut -Path $currentPath
                      if ($null -eq $primaryShortcut) { $primaryShortcut = $currentPath }

                      foreach ($item in @(Get-ChildItem -LiteralPath $desktop -Filter "*.lnk" -File -ErrorAction SilentlyContinue)) {
                          try {
                              $existing = $shell.CreateShortcut($item.FullName)
                              $probe = "{0} {1} {2}" -f $existing.TargetPath, $existing.Arguments, $existing.WorkingDirectory
                              $directOneClick = ($probe -match "one_click_home_local\\.ps1") -and ($probe -notmatch "-SkipInstall")
                              if (($probe -match "localhost:8000") -or $directOneClick -or ($knownNames -contains $item.BaseName)) {
                                  Set-QuantumShortcut -Path $item.FullName
                              }
                          }
                          catch { continue }
                      }

                      foreach ($item in @(Get-ChildItem -LiteralPath $desktop -Filter "*.url" -File -ErrorAction SilentlyContinue)) {
                          try {
                              $raw = Get-Content -LiteralPath $item.FullName -Raw -ErrorAction Stop
                              if (($raw -match "localhost:8000") -or ($knownNames -contains $item.BaseName)) {
                                  $disabledPath = $item.FullName + ".disabled_" + $timestamp
                                  Move-Item -LiteralPath $item.FullName -Destination $disabledPath -Force
                                  Set-QuantumShortcut -Path ([IO.Path]::ChangeExtension($item.FullName, ".lnk"))
                              }
                          }
                          catch { continue }
                      }
                  }

                  if ($null -ne $primaryShortcut) {
                      Write-Host (Get-QuantumRussianText -Encoded "0K/RgNC70YvQuiDQvdCwINGA0LDQsdC+0YfQtdC8INGB0YLQvtC70LUg0YHQvtC30LTQsNC9OiB7MH0=" -Arguments @($primaryShortcut))
                  }
              }
              catch {
                  Write-Warning (Get-QuantumRussianText -Encoded "0J3QtSDRg9C00LDQu9C+0YHRjCDRgdC+0LfQtNCw0YLRjCDRj9GA0LvRi9C6INC90LAg0YDQsNCx0L7Rh9C10Lwg0YHRgtC+0LvQtTogezB9" -Arguments @($($_.Exception.GetType().Name)))
              }
          }
          '''.replace('\n', '\r\n')
          installer_path.write_bytes((installer[:start] + shortcut_function + installer[end:]).encode('ascii'))

          test_path = Path('tests/test_windows_installed_bootstrap_repair.py')
          test_path.write_text('''from __future__ import annotations

from pathlib import Path
import unittest

ROOT = Path(__file__).resolve().parents[1]
WINDOWS = ROOT / "scripts" / "windows"

class WindowsInstalledBootstrapRepairTests(unittest.TestCase):
    @classmethod
    def setUpClass(cls) -> None:
        cls.one_click = (WINDOWS / "one_click_home_local.ps1").read_text(encoding="utf-8")
        cls.installer = (WINDOWS / "install_home_local.ps1").read_text(encoding="utf-8")

    def test_installed_mode_does_not_depend_on_one_runtime_sentinel(self) -> None:
        start = self.one_click.index('if (-not $SkipInstall -and [string]::IsNullOrWhiteSpace($PackageRoot)')
        end = self.one_click.index('if ($SkipInstall)', start)
        block = self.one_click[start:end]
        self.assertIn('$packageInstaller = Join-Path $installedCandidate "scripts\\\\install_home_local.ps1"', block)
        self.assertIn('if (-not (Test-Path -LiteralPath $packageInstaller -PathType Leaf))', block)
        self.assertIn('$SkipInstall = $true', block)
        self.assertIn('$InstalledRoot = $installedCandidate', block)
        self.assertNotIn('$installedRuntime', block)
        self.assertNotIn('desktop_center.py', block)

    def test_installer_repairs_legacy_shortcuts_before_first_runtime(self) -> None:
        script = self.installer
        for token in ('"Quantum Analytics"', '"Quantum"', 'one_click_home_local\\\\.ps1', '$probe -notmatch "-SkipInstall"', '"localhost:8000"', 'Filter "*.lnk"', 'Filter "*.url"', '".disabled_"', '$env:OneDrive', 'Set-QuantumShortcut -Path $item.FullName', 'New-QuantumShortcut -Launcher $startCommandTarget'):
            self.assertIn(token, script)

    def test_windows_bootstrap_scripts_remain_ascii(self) -> None:
        for name, script in (("one_click_home_local.ps1", self.one_click), ("install_home_local.ps1", self.installer)):
            self.assertEqual(sorted({c for c in script if ord(c) > 127}), [], name)

if __name__ == "__main__":
    unittest.main()
''', encoding='utf-8', newline='\n')

          support_path = Path('tests/integration_manifest_support_m8.py')
          support = support_path.read_text(encoding='utf-8')
          support = support.replace('range(1, 79)', 'range(1, 80)').replace('through the append-only R78 overlay', 'through the append-only R79 overlay')
          support_path.write_text(support, encoding='utf-8', newline='\n')

          entries = []
          for relative in (
              'scripts/windows/one_click_home_local.ps1',
              'scripts/windows/install_home_local.ps1',
              'tests/test_windows_installed_bootstrap_repair.py',
              'tests/integration_manifest_support_m8.py',
          ):
              raw = Path(relative).read_bytes()
              entries.append([relative, hashlib.sha256(raw).hexdigest(), len(raw)])
          overlay = {
              'base_pilot_integration_r78_overlay_git_blob_sha': '2eb460df19a092557da9b510dc820bf08762a74e',
              'entries': entries,
              'hash_encoding': 'sha256-hex',
              'overlay_version': 79,
              'reason': 'Recognize installer-less installed roots without a runtime sentinel and migrate legacy, direct-one-click and localhost shortcuts during installation before first desktop startup',
              'remove_paths': [],
          }
          Path('docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R79.json').write_text(json.dumps(overlay, indent=2) + '\n', encoding='utf-8', newline='\n')

          for path in (one_path, installer_path):
              raw = path.read_bytes()
              if any(byte > 127 for byte in raw):
                  raise SystemExit(f'non-ASCII byte in {path}')
          PY

      - name: Run focused regression tests
        run: python -m unittest tests.test_windows_installed_bootstrap_repair -v

      - name: Commit exact hotfix and remove staging workflow
        shell: bash
        run: |
          git config user.name "quantum-r79-bot"
          git config user.email "quantum-r79-bot@users.noreply.github.com"
          git rm .github/workflows/apply-r79-bootstrap-hotfix.yml
          git add scripts/windows/one_click_home_local.ps1 scripts/windows/install_home_local.ps1 tests/test_windows_installed_bootstrap_repair.py tests/integration_manifest_support_m8.py docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R79.json
          git commit -m "fix(windows): repair installed bootstrap and legacy shortcuts R79"
          git push origin HEAD:fix/quantum-one-click-stable-release
