name: Publish Verified Quantum Russian Repair

on:
  push:
    branches:
      - fix/quantum-one-click-stable-release

permissions:
  contents: write

concurrency:
  group: publish-verified-quantum-russian-repair
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.head_commit.message == 'Stage verified Quantum Russian repair payload'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact staging commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify and apply exact patch
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations
          import base64, gzip, hashlib, json, subprocess
          from pathlib import Path

          encoded_path = Path('.github/quantum-russian-repair.patch.gz.b64')
          compressed = base64.b64decode(encoded_path.read_text(encoding='ascii'), validate=True)
          expected_compressed_sha = '0638b2da405179f8f8bee4d9b5b3dd11b3337a6a58717a6bb54ce8e756e2457a'
          actual_compressed_sha = hashlib.sha256(compressed).hexdigest()
          if actual_compressed_sha != expected_compressed_sha:
              raise SystemExit(f'PATCH_PAYLOAD_SHA256_MISMATCH:{actual_compressed_sha}')
          patch = gzip.decompress(compressed)
          patch_path = Path('/tmp/quantum-russian-repair.patch')
          patch_path.write_bytes(patch)
          subprocess.run(['git','apply','--check',str(patch_path)],check=True)
          subprocess.run(['git','apply','--index',str(patch_path)],check=True)
          expected_paths = json.loads('["docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R71.json","docs/pilot/WINDOWS_HOME_LOCAL_PACKAGE.md","scripts/windows/build_exe_installer.ps1","scripts/windows/build_local_production.ps1","scripts/windows/build_two_installer_bundles.ps1","scripts/windows/configure_home_local.ps1","scripts/windows/import_source.ps1","scripts/windows/install_home_local.ps1","scripts/windows/one_click_home_local.ps1","src/quantum/application/local_app.py","src/quantum/outputs/dashboard.py","src/quantum/outputs/dashboard_script_controls.py","src/quantum/outputs/dashboard_script_core.py","src/quantum/outputs/dashboard_script_data.py","src/quantum/outputs/dashboard_shell.py","src/quantum/outputs/xlsx_rows.py","src/quantum/pilot/import_xlsx_source.ps1","tests/integration_manifest_support_m8.py","tests/test_interactive_dashboard_r1.py","tests/test_m0_attestation_redteam.py","tests/test_m0_recovery_after_m1.py","tests/test_m5_color_ui_graph_quality.py","tests/test_russian_home_local_release.py","tests/test_tz_correction_and_exe_installer.py","tests/test_windows_hash_compat_r4.py","tests/test_windows_one_click_installer_r1.py","tests/test_windows_redteam_hardening.py","tests/test_windows_source_package_launchers_r1.py","tools/m7_security_performance_one_click.py"]')
          expected_hashes = json.loads('{"docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R71.json":"4ee54d4d5c3ffaa428dda9d70b9d85d9880e2da3afd2a11bd8ba7cdf77f4e536","docs/pilot/WINDOWS_HOME_LOCAL_PACKAGE.md":"f078af9cd457d6daf528b87f82ca223c6d7280b6f3559b33bf8d51dd94bc2166","scripts/windows/build_exe_installer.ps1":"c2c853552c4f53d508c626df32b2f3713f0a99b97f09f1871104498c324fbc5b","scripts/windows/build_local_production.ps1":"6922768d0f198e78c5b797c69b75134eca1ce662faabc2d4af3b03210b8b7ed8","scripts/windows/build_two_installer_bundles.ps1":"1d50d3c79585220a07a50e4d6eb6fb935bece1b0a563d95cc153f8d16582e2f5","scripts/windows/configure_home_local.ps1":"d082eaf59c810c030e7e56a71479414b25d112be6c4388cea648ac303d8cd9c1","scripts/windows/import_source.ps1":"854d7ab179ca2b0e725a12c769569fac96a48f3f769cf71e8145527fb5fc9ab8","scripts/windows/install_home_local.ps1":"cbf93f00083e13ab0204b8dd3b396baefaaa00ec2df9e39011b8e8fa42adc628","scripts/windows/one_click_home_local.ps1":"5331f599bbffe0e08b0969353e65db57b9431b0330f0ff8cddd27599e81b0d76","src/quantum/application/local_app.py":"f38d577f54e06aa7631ee2c5cfcf3773eafc3448baf1fe00604c4236706d6e44","src/quantum/outputs/dashboard.py":"b33a7e5bf86020a611d898f7aa558ec776e92e6373ca16bf8bdbfd9e67a77810","src/quantum/outputs/dashboard_script_controls.py":"cac7a7abf1e1c27427715ee7f949db8da7874f0ebc9a61ae15814645231144fb","src/quantum/outputs/dashboard_script_core.py":"8a92d746627ef7985f70cf93211c38f1d6b49c49321b903953c2584d1f150db6","src/quantum/outputs/dashboard_script_data.py":"d1cce44e757b5fac45dec36c90a1959528fbf676a52efe557ad3b31fd311fe89","src/quantum/outputs/dashboard_shell.py":"8c6d94fc2a0f8721f9d68e680eac502beb220fac7620f3c20523f4293a0806b7","src/quantum/outputs/xlsx_rows.py":"6887d97876d98b58c4b773eade9739adce4c55d5dee6e2717f3700e12e0800a8","src/quantum/pilot/import_xlsx_source.ps1":"4d95be202e8596bcaf604227f336db3dd62f708b9cb3916d744321e97b5367c3","tests/integration_manifest_support_m8.py":"ebe0673f80ab65f44010c2133ed3991e1d556760abe60190e5d5f25828c712e1","tests/test_interactive_dashboard_r1.py":"d233ed95d1e0c35faba6ee805b94b35e8f273d0af48752e99451265bd93310a7","tests/test_m0_attestation_redteam.py":"f90a47b0be0de91bf642b182765f3cfaf3ba04a7dfeaf9e9069dc364d6e416cb","tests/test_m0_recovery_after_m1.py":"2556e7b5686fce88f61b5a5de7366417abd211a089a8033d288e00b7e4f72843","tests/test_m5_color_ui_graph_quality.py":"aafb5bcc053f7393628844760bd21dcb61510bd178a75d05b835038a1f544c30","tests/test_russian_home_local_release.py":"961164120a00dd1a230dc2b9f925c070ec5855a7a5538388940ec2b4f305badd","tests/test_tz_correction_and_exe_installer.py":"bfa6181fe450798350beb7ba77858ef45ff406916a230984c588a9725bc254b7","tests/test_windows_hash_compat_r4.py":"c233112bcf31d50d4d993ea6f9404fdaaa98b599c5dd5134cc08e4a0ada4125c","tests/test_windows_one_click_installer_r1.py":"84330b3efba36dda260781ce46ef067016ceeec58eae4d53bc8149293b08609a","tests/test_windows_redteam_hardening.py":"8140fa12a81c58804235f97c4a837667db8e2bbcbca1e1f80b96dcec820beded","tests/test_windows_source_package_launchers_r1.py":"6f03b0321e16663389f111e6d490c920e84a4fb9f6381a12050876318b3aa635","tools/m7_security_performance_one_click.py":"7b49dc742a2603a0ee7508d46aad6ca05a658830f2db918cbe5e429294816a59"}')
          staged = subprocess.check_output(['git','diff','--cached','--name-only'],text=True).splitlines()
          if staged != expected_paths:
              raise SystemExit('STAGED_PATH_SET_MISMATCH\nexpected=' + repr(expected_paths) + '\nactual=' + repr(staged))
          for relative, expected in expected_hashes.items():
              actual = hashlib.sha256(Path(relative).read_bytes()).hexdigest()
              if actual != expected:
                  raise SystemExit(f'PATCH_RESULT_SHA256_MISMATCH:{relative}:{actual}')
          print(json.dumps({'status':'PATCH_VERIFIED','files':len(staged),'compressed_sha256':actual_compressed_sha},sort_keys=True))
          PY
      - name: Run complete CI on patched tree
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          PYTHONPATH: src
        run: python -m quantum.scripts.ci
      - name: Commit exact verified repair
        shell: bash
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Localize Quantum HOME_LOCAL and installer in Russian'
          git push origin HEAD:fix/quantum-one-click-stable-release
