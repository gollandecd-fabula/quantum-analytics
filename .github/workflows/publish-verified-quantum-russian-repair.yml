name: Publish Verified Quantum Russian Repair

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: publish-verified-quantum-russian-repair
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'fix/quantum-one-click-stable-release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Gate exact publisher commit
        id: gate
        shell: bash
        run: |
          if [ "$(git log -1 --pretty=%s)" = "Retest verified repair without staging artifacts" ]; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.12
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify chunks and apply exact patch
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations
          import base64
          import gzip
          import hashlib
          import subprocess
          from pathlib import Path

          parts_dir = Path('.github/quantum-russian-repair-patch')
          expected_blob_shas = {
              'part-00.txt': 'cc7eea6ddd8357089a14975dc79924a4fc4c9bb1',
              'part-01.txt': '059a4108cd000bc775fac06558f5a0facdf96bde',
              'part-02.txt': 'c8c642c7cb08f31a935b4fd20487e0ae635f488c',
              'part-03.txt': '12a9715a39f5471de65e08c3d5c7dd8d1c6eb563',
              'part-04.txt': 'f8b2fcd04b7c65294b3ebec372b8e99260960bd8',
              'part-05.txt': '5a5098d6c14230515b0af989904b15e7f8047141',
              'part-06.txt': '27ce01a8f515c31896924223b0414d4f11073897',
              'part-07.txt': 'aea4ddeb97053dc476b41299f0abf5f6424938a3',
              'part-08.txt': 'b13d35a7596487dfe77f49575d2b5eb9f1c38b71',
          }
          actual_names = sorted(path.name for path in parts_dir.glob('part-*.txt'))
          expected_names = list(expected_blob_shas)
          if actual_names != expected_names:
              raise SystemExit(f'PATCH_PART_SET_MISMATCH:{actual_names!r}')

          encoded_parts: list[str] = []
          for name, expected_blob_sha in expected_blob_shas.items():
              path = parts_dir / name
              actual_blob_sha = subprocess.check_output(
                  ['git', 'hash-object', str(path)], text=True
              ).strip()
              if actual_blob_sha != expected_blob_sha:
                  raise SystemExit(
                      f'PATCH_PART_BLOB_MISMATCH:{name}:{actual_blob_sha}'
                  )
              encoded_parts.append(path.read_text(encoding='ascii'))

          compressed = base64.b64decode(''.join(encoded_parts), validate=True)
          expected_compressed_sha = '0638b2da405179f8f8bee4d9b5b3dd11b3337a6a58717a6bb54ce8e756e2457a'
          actual_compressed_sha = hashlib.sha256(compressed).hexdigest()
          if actual_compressed_sha != expected_compressed_sha:
              raise SystemExit(
                  f'PATCH_PAYLOAD_SHA256_MISMATCH:{actual_compressed_sha}'
              )

          patch_path = Path('/tmp/quantum-russian-repair.patch')
          patch_path.write_bytes(gzip.decompress(compressed))
          subprocess.run(['git', 'apply', '--check', str(patch_path)], check=True)
          subprocess.run(['git', 'apply', '--index', str(patch_path)], check=True)

          expected_paths = sorted('''
          docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R71.json
          docs/pilot/WINDOWS_HOME_LOCAL_PACKAGE.md
          scripts/windows/build_exe_installer.ps1
          scripts/windows/build_local_production.ps1
          scripts/windows/build_two_installer_bundles.ps1
          scripts/windows/configure_home_local.ps1
          scripts/windows/import_source.ps1
          scripts/windows/install_home_local.ps1
          scripts/windows/one_click_home_local.ps1
          src/quantum/application/local_app.py
          src/quantum/outputs/dashboard.py
          src/quantum/outputs/dashboard_script_controls.py
          src/quantum/outputs/dashboard_script_core.py
          src/quantum/outputs/dashboard_script_data.py
          src/quantum/outputs/dashboard_shell.py
          src/quantum/outputs/xlsx_rows.py
          src/quantum/pilot/import_xlsx_source.ps1
          tests/integration_manifest_support_m8.py
          tests/test_interactive_dashboard_r1.py
          tests/test_m0_attestation_redteam.py
          tests/test_m0_recovery_after_m1.py
          tests/test_m5_color_ui_graph_quality.py
          tests/test_russian_home_local_release.py
          tests/test_tz_correction_and_exe_installer.py
          tests/test_windows_hash_compat_r4.py
          tests/test_windows_one_click_installer_r1.py
          tests/test_windows_redteam_hardening.py
          tests/test_windows_source_package_launchers_r1.py
          tools/m7_security_performance_one_click.py
          '''.split())
          staged = sorted(
              subprocess.check_output(
                  ['git', 'diff', '--cached', '--name-only'], text=True
              ).splitlines()
          )
          if staged != expected_paths:
              raise SystemExit(f'STAGED_PATH_SET_MISMATCH:{staged!r}')
          print(
              f'PATCH_VERIFIED files={len(staged)} '
              f'sha256={actual_compressed_sha}'
          )
          PY

      - name: Remove staging artifacts from tested tree
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          git rm -r .github/quantum-russian-repair-patch
          git rm .github/quantum-russian-repair.patch.gz.b64
          git rm .github/workflows/publish-verified-quantum-russian-repair.yml

      - name: Run complete Quantum CI
        if: steps.gate.outputs.run == 'true'
        env:
          PYTHONDONTWRITEBYTECODE: '1'
          PYTHONPATH: src
        run: python -m quantum.scripts.ci

      - name: Commit verified repair
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Localize Quantum HOME_LOCAL and installer in Russian'
          git push origin HEAD:fix/quantum-one-click-stable-release
