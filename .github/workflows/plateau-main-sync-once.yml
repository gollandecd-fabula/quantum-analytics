name: Plateau Main Sync Once

on:
  push:
    branches:
      - fix/quantum-plateau-redteam

permissions:
  contents: write

concurrency:
  group: plateau-main-sync-once
  cancel-in-progress: false

jobs:
  synchronize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout plateau branch with complete history
        uses: actions/checkout@v4
        with:
          ref: fix/quantum-plateau-redteam
          fetch-depth: 0

      - name: Create real main ancestry and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "quantum-plateau-bot"
          git config user.email "quantum-plateau-bot@users.noreply.github.com"
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            git merge --strategy=ours --no-ff origin/main \
              -m "merge(main): establish plateau ancestry after byte reconciliation"
          fi
          git rm .github/workflows/plateau-main-sync-once.yml
          git commit -m "chore(sync): remove one-time main ancestry workflow"
          git push origin HEAD:fix/quantum-plateau-redteam
