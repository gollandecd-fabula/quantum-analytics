name: M9 Maximum Assurance Control Plane

on:
  workflow_dispatch:
  push:
    branches:
      - fix/quantum-one-click-stable-release
    paths:
      - ".github/workflows/m9-maximum-assurance-control-plane.yml"
      - "tools/m9_maximum_assurance_control_plane.py"
      - "tests/test_m9_maximum_assurance_control_plane.py"
      - "tests/integration_manifest_support_m8.py"
      - "docs/evidence/M9_MAXIMUM_ASSURANCE_CONTROL_PLANE.json"
      - "docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R80.json"
  pull_request:
    paths:
      - ".github/workflows/m9-maximum-assurance-control-plane.yml"
      - "tools/m9_maximum_assurance_control_plane.py"
      - "tests/test_m9_maximum_assurance_control_plane.py"
      - "tests/integration_manifest_support_m8.py"
      - "docs/evidence/M9_MAXIMUM_ASSURANCE_CONTROL_PLANE.json"
      - "docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R80.json"

permissions:
  contents: read

concurrency:
  group: m9-maximum-assurance-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

env:
  TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  PYTHONUTF8: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONNOUSERSITE: "1"

jobs:
  linux-source-runtime:
    name: Linux L2 control-plane and negative controls
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout exact head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.TARGET_SHA }}
          clean: true
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Run exact-head M9 gate
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          evidence="$RUNNER_TEMP/m9-linux-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          rm -rf "$evidence"
          mkdir -p "$evidence/bundle"
          python -m unittest tests.test_m9_maximum_assurance_control_plane -v 2>&1 | tee "$evidence/unit-tests.log"
          python tools/m9_maximum_assurance_control_plane.py bootstrap \
            --output-dir "$evidence/bundle" \
            --exact-head "$TARGET_SHA"
          python tools/m9_maximum_assurance_control_plane.py audit \
            --bundle-dir "$evidence/bundle" \
            --expected-sha "$TARGET_SHA" \
            --output "$evidence/AUDIT_REPORT.json"
          python tools/m9_maximum_assurance_control_plane.py self-test \
            --expected-sha "$TARGET_SHA" \
            --output "$evidence/HARNESS_NEGATIVE_CONTROLS.json"
          test "$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["status"])' "$evidence/AUDIT_REPORT.json")" = "PASS"
          test "$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["status"])' "$evidence/HARNESS_NEGATIVE_CONTROLS.json")" = "PASS"

      - name: Upload Linux M9 evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: M9-Linux-Control-Plane-${{ env.TARGET_SHA }}
          path: ${{ runner.temp }}/m9-linux-${{ github.run_id }}-${{ github.run_attempt }}/**
          if-no-files-found: error
          retention-days: 30

  windows-source-runtime:
    name: Windows L2 control-plane and negative controls
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - name: Disable Git CRLF conversion
        shell: pwsh
        run: git config --global core.autocrlf false

      - name: Checkout exact head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.TARGET_SHA }}
          clean: true
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Run exact-head M9 gate
        shell: pwsh
        env:
          PYTHONPATH: ${{ github.workspace }}\src
        run: |
          $actual = (& git rev-parse HEAD).Trim()
          if ($actual -ne $env:TARGET_SHA) {
            throw "Exact-head mismatch: expected $env:TARGET_SHA, got $actual"
          }
          $evidence = Join-Path $env:RUNNER_TEMP "m9-windows-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          Remove-Item $evidence -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path (Join-Path $evidence "bundle") -Force | Out-Null
          python -m unittest tests.test_m9_maximum_assurance_control_plane -v 2>&1 |
            Tee-Object (Join-Path $evidence "unit-tests.log")
          if ($LASTEXITCODE -ne 0) { throw "M9 unit tests failed." }
          python tools/m9_maximum_assurance_control_plane.py bootstrap `
            --output-dir (Join-Path $evidence "bundle") `
            --exact-head $env:TARGET_SHA
          if ($LASTEXITCODE -ne 0) { throw "M9 bootstrap failed." }
          python tools/m9_maximum_assurance_control_plane.py audit `
            --bundle-dir (Join-Path $evidence "bundle") `
            --expected-sha $env:TARGET_SHA `
            --output (Join-Path $evidence "AUDIT_REPORT.json")
          if ($LASTEXITCODE -ne 0) { throw "M9 audit failed." }
          python tools/m9_maximum_assurance_control_plane.py self-test `
            --expected-sha $env:TARGET_SHA `
            --output (Join-Path $evidence "HARNESS_NEGATIVE_CONTROLS.json")
          if ($LASTEXITCODE -ne 0) { throw "M9 negative controls failed." }
          $audit = Get-Content (Join-Path $evidence "AUDIT_REPORT.json") -Raw -Encoding UTF8 | ConvertFrom-Json
          $controls = Get-Content (Join-Path $evidence "HARNESS_NEGATIVE_CONTROLS.json") -Raw -Encoding UTF8 | ConvertFrom-Json
          if ($audit.status -ne "PASS" -or $controls.status -ne "PASS") {
            throw "M9 fail-closed report status is not PASS."
          }

      - name: Upload Windows M9 evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: M9-Windows-Control-Plane-${{ env.TARGET_SHA }}
          path: ${{ runner.temp }}/m9-windows-${{ github.run_id }}-${{ github.run_attempt }}/**
          if-no-files-found: error
          retention-days: 30
