name: M0 Finalize Immutable R41

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: m0-finalize-r41
  cancel-in-progress: false

jobs:
  finalize-r41:
    if: github.head_ref == 'automation/m0-reconciliation-v4'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Create immutable R41 and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          python tools/m0_finalize_r41.py

      - name: Run exact tests without generated artifacts
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail
          PYTHONPATH=src python -B -m unittest -v tests.test_m0_attestation_redteam
          PYTHONPATH=src python -B -m unittest -v tests.test_windows_source_package_launchers_r1
          PYTHONPATH=src python -B -m unittest discover -s tests -p 'test_*.py'
          git diff --check
          test -z "$(git ls-files | grep -E '(^|/)__pycache__/|\.pyc$|^m0-.*\.log$' || true)"
          test ! -e tools/m0_finalize_r41.py
          test ! -e .github/workflows/m0-finalize-r41.yml

      - name: Commit clean R41 candidate
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          git config user.name "quantum-m0-redteam-bot"
          git config user.email "quantum-m0-redteam-bot@users.noreply.github.com"
          git add -A
          git commit -m "M0: finalize exception-safe Windows wrappers in immutable R41"
          git push \
            --force-with-lease=refs/heads/automation/m0-reconciliation-v4:"$EXPECTED_HEAD" \
            origin HEAD:automation/m0-reconciliation-v4
