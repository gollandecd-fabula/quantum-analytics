name: Quantum Any File Extension

on:
  workflow_dispatch:
  push:
    branches:
      - import-any-file-r1
    paths:
      - "src/quantum/pilot/any_file_*.py"
      - "tests/test_any_file_gateway.py"
      - "scripts/windows/import_any_file.ps1"
      - "scripts/windows/install_any_file_extension.ps1"
      - "scripts/windows/build_any_file_extension.ps1"
      - ".github/workflows/any-file-extension.yml"
  pull_request:
    paths:
      - "src/quantum/pilot/any_file_*.py"
      - "tests/test_any_file_gateway.py"
      - "scripts/windows/import_any_file.ps1"
      - "scripts/windows/install_any_file_extension.ps1"
      - "scripts/windows/build_any_file_extension.ps1"
      - ".github/workflows/any-file-extension.yml"

permissions:
  contents: read

jobs:
  test-build-install:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Assert exact head
        shell: pwsh
        run: |
          $expected = "${{ github.event.pull_request.head.sha || github.sha }}"
          $actual = (& git rev-parse HEAD).Trim()
          if ($actual -ne $expected) {
            throw "Expected exact head $expected, got $actual"
          }

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile and test gateway
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -m py_compile `
            src/quantum/pilot/any_file_common.py `
            src/quantum/pilot/any_file_detection.py `
            src/quantum/pilot/any_file_gateway.py `
            src/quantum/pilot/any_file_runner.py
          if ($LASTEXITCODE -ne 0) { throw "Compile failed." }
          python -m unittest `
            tests.test_any_file_gateway `
            tests.test_windows_local_runner `
            tests.test_xlsx_real_office_compat `
            -v
          if ($LASTEXITCODE -ne 0) { throw "Regression tests failed." }

      - name: Parse PowerShell
        shell: pwsh
        run: |
          foreach ($file in @(
            "scripts/windows/import_any_file.ps1",
            "scripts/windows/install_any_file_extension.ps1",
            "scripts/windows/build_any_file_extension.ps1"
          )) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              throw "PowerShell parse failed: $file"
            }
          }

      - name: Build extension
        shell: pwsh
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\scripts\windows\build_any_file_extension.ps1
          if ($LASTEXITCODE -ne 0) { throw "Extension build failed." }

      - name: Verify and install extension
        shell: pwsh
        run: |
          $archive = "dist\QuantumAnyFileExtension_R3.zip"
          if (-not (Test-Path -LiteralPath $archive -PathType Leaf)) {
            throw "Extension archive missing."
          }
          $extract = Join-Path $env:RUNNER_TEMP "quantum-any-extension"
          $target = Join-Path $env:RUNNER_TEMP "quantum-existing-r2"
          Remove-Item -LiteralPath $extract -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $target -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -LiteralPath $archive -DestinationPath $extract

          $manifest = Get-Content -LiteralPath (Join-Path $extract "manifest.sha256.json") -Raw -Encoding UTF8 | ConvertFrom-Json
          if ([string]$manifest.package_version -ne "R3_ANY_FILE_EXTENSION") {
            throw "Unexpected extension version."
          }
          if ([string]$manifest.source_commit -ne "${{ github.event.pull_request.head.sha || github.sha }}") {
            throw "Artifact is not bound to exact head."
          }
          foreach ($entry in @($manifest.files)) {
            $path = Join-Path $extract ([string]$entry.path).Replace("/", "\")
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Manifest file missing: $($entry.path)"
            }
            $actual = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -ne [string]$entry.sha256) {
              throw "Manifest hash mismatch: $($entry.path)"
            }
          }

          Copy-Item -LiteralPath "src" -Destination (Join-Path $target "src") -Recurse -Force
          foreach ($name in @("config", "data", "output", "scripts")) {
            New-Item -ItemType Directory -Path (Join-Path $target $name) -Force | Out-Null
          }
          foreach ($name in @("config", "data", "output")) {
            Set-Content -LiteralPath (Join-Path $target "$name\sentinel.txt") -Value $name -Encoding ASCII
          }

          powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File (Join-Path $extract "scripts\install_any_file_extension.ps1") `
            -SourceRoot $extract `
            -TargetRoot $target
          if ($LASTEXITCODE -ne 0) { throw "Extension installation failed." }

          foreach ($name in @("config", "data", "output")) {
            if (-not (Test-Path -LiteralPath (Join-Path $target "$name\sentinel.txt"))) {
              throw "User data sentinel removed: $name"
            }
          }
          foreach ($required in @(
            (Join-Path $target "src\quantum\pilot\any_file_common.py"),
            (Join-Path $target "src\quantum\pilot\any_file_detection.py"),
            (Join-Path $target "src\quantum\pilot\any_file_gateway.py"),
            (Join-Path $target "src\quantum\pilot\any_file_runner.py"),
            (Join-Path $target "scripts\import_any_file.ps1"),
            (Join-Path $target "IMPORT_ANY_FILE.cmd")
          )) {
            if (-not (Test-Path -LiteralPath $required -PathType Leaf)) {
              throw "Installed extension file missing: $required"
            }
          }

          $sample = Join-Path $env:RUNNER_TEMP "sample.json"
          $config = Join-Path $env:RUNNER_TEMP "config.json"
          $output = Join-Path $target "output\any-file-smoke.json"
          Set-Content -LiteralPath $sample -Value '{"orders":3}' -Encoding UTF8
          Set-Content -LiteralPath $config -Value '{}' -Encoding UTF8
          $hash = (Get-FileHash -LiteralPath $sample -Algorithm SHA256).Hash.ToLowerInvariant()
          $env:PYTHONPATH = Join-Path $target "src"
          python -m quantum.pilot.any_file_runner `
            --file $sample `
            --config $config `
            --storage-root (Join-Path $target "data") `
            --output $output `
            --home-local `
            --authority-attested `
            --schema-reviewed `
            --expected-file-sha256 $hash
          if ($LASTEXITCODE -ne 0) { throw "Installed runner smoke test failed." }
          $report = Get-Content -LiteralPath $output -Raw -Encoding UTF8 | ConvertFrom-Json
          if ([string]$report.status -ne "ACCEPTED_PARTIAL") {
            throw "Unexpected installed runner status: $($report.status)"
          }

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuantumAnyFileExtension-R3
          path: dist/QuantumAnyFileExtension_R3.zip
          if-no-files-found: error
          retention-days: 14
