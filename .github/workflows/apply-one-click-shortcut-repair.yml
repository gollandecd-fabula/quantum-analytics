name: Apply One Click Shortcut Repair

on:
  push:
    branches: [fix/quantum-tax-base-gui-startup]
    paths: [".github/workflows/apply-one-click-shortcut-repair.yml"]

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/quantum-tax-base-gui-startup
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Apply and verify bounded repair
        shell: pwsh
        env:
          EXPECTED_BASE: 1106c7f289070eaa2c63dcdfc5c7a4ee008656eb
          OLD_Z64: 
          NEW_Z64: 
          WF_Z64: 
        run: |
          if ((& git rev-parse HEAD^).Trim() -ne $env:EXPECTED_BASE) { throw "Unexpected repair base" }
          @'
          from pathlib import Path
          import base64, hashlib, json, os, zlib
          root=Path.cwd()
          dec=lambda key:zlib.decompress(base64.b64decode(os.environ[key]))
          one=root/"scripts/windows/one_click_home_local.ps1"
          raw=one.read_bytes(); old=dec("OLD_Z64"); new=dec("NEW_Z64")
          if raw.count(old)!=1: raise SystemExit("one-click source identity mismatch")
          one.write_bytes(raw.replace(old,new,1))
          workflow=root/".github/workflows/l4-installed-runtime.yml"
          workflow.write_bytes(dec("WF_Z64"))
          integration=root/"tests/integration_manifest_support_m8.py"
          text=integration.read_text(encoding="utf-8")
          if "range(1, 90)" not in text or "R89 overlay" not in text: raise SystemExit("M8 identity mismatch")
          integration.write_text(text.replace("range(1, 90)","range(1, 91)",1).replace("R89 overlay","R90 overlay",1),encoding="utf-8")
          paths=[".github/workflows/l4-installed-runtime.yml","scripts/windows/one_click_home_local.ps1","tests/integration_manifest_support_m8.py"]
          entries=[]
          for rel in paths:
              data=(root/rel).read_bytes(); entries.append([rel,hashlib.sha256(data).hexdigest(),len(data)])
          overlay={"base_pilot_integration_r89_overlay_git_blob_sha":"39e5bc6e85afb8ef006c23f1ce114e2829be3ca5","entries":entries,"hash_encoding":"sha256-hex","overlay_version":90,"reason":"Repair the installed one-click shortcut path by recovering installed mode when a stale package launcher explicitly passes the installed root as PackageRoot, add an exact-head Windows installed-launcher GUI regression that reproduces the physical failure, require non-empty L4 postcheck logging, and keep L5, merge, release and marketplace writes explicitly unverified or disabled","remove_paths":[]}
          (root/"docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R90.json").write_text(json.dumps(overlay,ensure_ascii=False,indent=2)+"\n",encoding="utf-8")
          w=workflow.read_text(encoding="utf-8"); o=one.read_text(encoding="utf-8")
          required=["$hasInstalledLayout" in o,"$PackageRoot = $null" in o,"Run installed one-click shortcut regression" in w,"-PackageRoot \"%~dp0\"" in w,"ONE_CLICK_GUI_WINDOW_NOT_FOUND" in w,"L4 independent postcheck log was not produced." in w,"ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R90.json" in w,"physical_user_path_verified = $true" not in w]
          if not all(required): raise SystemExit("repair assertions failed")
          (root/".github/workflows/apply-one-click-shortcut-repair.yml").unlink()
          '@ | Set-Content apply_repair.py -Encoding UTF8
          python apply_repair.py
          Remove-Item apply_repair.py -Force
          $env:PYTHONPATH="src"
          python -m unittest tests.test_l4_installed_runtime_contract tests.test_l4_installed_runtime_postcheck_contract -v
          if ($LASTEXITCODE -ne 0) { throw "L4 contract regression failed" }
          $tokens=$null; $errors=$null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path "scripts/windows/one_click_home_local.ps1"),[ref]$tokens,[ref]$errors)|Out-Null
          if ($errors.Count -gt 0) { throw "PowerShell parse failed" }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw "git diff check failed" }
      - name: Commit repair
        shell: pwsh
        run: |
          git config user.name "quantum-repair-bot"
          git config user.email "quantum-repair-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix(one-click): recover installed shortcut launcher"
          git push origin HEAD:fix/quantum-tax-base-gui-startup
