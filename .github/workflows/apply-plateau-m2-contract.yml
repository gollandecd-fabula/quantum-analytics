name: Apply Plateau M2 Contract

on:
  push:
    branches:
      - fix/quantum-plateau-redteam
    paths:
      - .github/workflows/apply-plateau-m2-contract.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/quantum-plateau-redteam
          fetch-depth: 0

      - name: Migrate tests and create R80 evidence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json

          test_path = Path('tests/test_finance_center_profile.py')
          text = test_path.read_text(encoding='utf-8')

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one test anchor, found {count}: {old!r}')
              text = text.replace(old, new, 1)

          replace_once(
              '        profile.tax_rate_percent = "6"\n        profile.other_expense_per_unit = "40"\n        profile.groups["Верх"].cost_per_unit = "400"',
              '        profile.tax_rate_percent = "6"\n        profile.tax_base_metric_id = "gross_sales_amount"\n        profile.other_expense_per_unit = "40"\n        profile.groups["Верх"].cost_per_unit = "400"',
          )
          replace_once(
              '            ("Налоговая ставка", "Прочие расходы на единицу", "Себестоимость: Футболка"),',
              '            ("Налоговая ставка", "Налоговая база", "Прочие расходы на единицу", "Себестоимость: Футболка"),',
          )
          replace_once(
              '        profile.tax_rate_percent = "0"\n        profile.other_expense_per_unit = "0"',
              '        profile.tax_rate_percent = "0"\n        profile.tax_base_metric_id = "gross_sales_amount"\n        profile.other_expense_per_unit = "0"',
          )
          replace_once(
              '        profile.tax_rate_percent = "6"\n        profile.other_expense_per_unit = "40"\n        group = profile.groups["Футболка"]',
              '        profile.tax_rate_percent = "6"\n        profile.tax_base_metric_id = "gross_sales_amount"\n        profile.other_expense_per_unit = "40"\n        group = profile.groups["Футболка"]',
          )
          replace_once(
              '        profile.tax_rate_percent = "6"\n        profile.other_expense_per_unit = "40"\n        profile.groups["Футболка"].cost_per_unit = "400"',
              '        profile.tax_rate_percent = "6"\n        profile.tax_base_metric_id = "gross_sales_amount"\n        profile.other_expense_per_unit = "40"\n        profile.groups["Футболка"].cost_per_unit = "400"',
          )
          replace_once(
              '        self.assertEqual(result.missing_inputs, ("UNATTRIBUTED_FINANCIAL_ROWS:1",))',
              '        self.assertEqual(result.missing_inputs, ("UNKNOWN_PRODUCT_FINANCIAL_ROWS:1",))',
          )
          test_path.write_text(text, encoding='utf-8', newline='\n')

          support_path = Path('tests/integration_manifest_support_m8.py')
          support = support_path.read_text(encoding='utf-8')
          if 'range(1, 80)' not in support:
              raise SystemExit('R79 manifest support anchor missing')
          support = support.replace('range(1, 80)', 'range(1, 81)', 1)
          support = support.replace(
              'through the append-only R79 overlay',
              'through the append-only R80 overlay',
              1,
          )
          support_path.write_text(support, encoding='utf-8', newline='\n')

          tracked = [
              'src/quantum/application/_finance_center_queue.py',
              'src/quantum/application/_finance_center_queue_runtime.py',
              'src/quantum/application/_finance_center_reports.py',
              'src/quantum/application/_finance_profile_model.py',
              'src/quantum/application/_finance_profile_groups.py',
              'src/quantum/application/finance_profile.py',
              'src/quantum/application/_finance_center_dialog.py',
              'src/quantum/application/_finance_profile_financial_rows.py',
              'src/quantum/application/_finance_profile_engine.py',
              'src/quantum/application/_finance_center_calculation.py',
              'tests/test_plateau_m1_runtime_integration.py',
              'tests/test_plateau_m2_financial_integration.py',
              'tests/test_finance_center_profile.py',
              'tests/test_profile_save_and_shortcut_hotfix.py',
              'tests/integration_manifest_support_m8.py',
          ]
          entries = []
          for relative in tracked:
              raw = Path(relative).read_bytes()
              entries.append([relative, hashlib.sha256(raw).hexdigest(), len(raw)])
          overlay = {
              'base_pilot_integration_r79_overlay_git_blob_sha': 'fd1ad0d03d342d63803ac0404346744806d8ec31',
              'entries': entries,
              'hash_encoding': 'sha256-hex',
              'overlay_version': 80,
              'reason': (
                  'Bind durable report persistence to the live desktop MRO path, verify selected and managed sources by SHA-256, require explicit user-confirmed tax base profile v2, classify unknown products separately from marketplace service rows, include unattributed WB expenses without inventing SKU allocation, treat zero-activity groups as valid, calculate tax once at period level, and add exact runtime and finance red-team regressions'
              ),
              'remove_paths': [],
          }
          Path('docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R80.json').write_text(
              json.dumps(overlay, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
              newline='\n',
          )
          PY

      - name: Run focused contract regressions
        run: |
          PYTHONPATH=src python -m unittest \
            tests.test_plateau_m1_runtime_integration \
            tests.test_plateau_m2_financial_integration \
            tests.test_finance_center_profile \
            tests.test_profile_save_and_shortcut_hotfix \
            tests.test_b1a_artifact_manifest \
            tests.test_a0_manifest_diagnostic -v

      - name: Commit atomic M2 contract and remove staging workflow
        shell: bash
        run: |
          git config user.name "quantum-plateau-bot"
          git config user.email "quantum-plateau-bot@users.noreply.github.com"
          git rm .github/workflows/apply-plateau-m2-contract.yml
          git add \
            tests/test_finance_center_profile.py \
            tests/integration_manifest_support_m8.py \
            docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R80.json
          git commit -m "fix(finance): finalize plateau M2 contract R80"
          git push origin HEAD:fix/quantum-plateau-redteam
