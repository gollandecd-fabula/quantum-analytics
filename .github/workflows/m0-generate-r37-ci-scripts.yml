name: M0 Generate R37 CI Scripts

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: m0-generate-r37-ci-scripts
  cancel-in-progress: false

jobs:
  generate:
    if: github.head_ref == 'automation/m0-reconciliation-v4'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Generate corrected versioned CI scripts
        shell: bash
        run: |
          set -euo pipefail
          python tools/m0_generate_r37_ci_scripts.py
          test -s scripts/ci/windows_local_production_r37.ps1
          test -s scripts/ci/native_one_button_r37.ps1
          grep -q 'malware_scan_clean = \$true' scripts/ci/windows_local_production_r37.ps1
          grep -q 'Quantum requires explicit AUTHORIZE and REVIEWED' scripts/ci/native_one_button_r37.ps1
          ! grep -q 'No dates, AUTHORIZE or REVIEWED input is required' scripts/ci/native_one_button_r37.ps1
          git diff --check

      - name: Run repository tests without generated bytecode
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail
          PYTHONPATH=src python -B -m unittest -v tests.test_m0_attestation_redteam
          PYTHONPATH=src python -B -m unittest discover -s tests -p 'test_*.py'
          test -z "$(git ls-files | grep -E '(^|/)__pycache__/|\.pyc$|^m0-.*\.log$' || true)"

      - name: Commit generated non-workflow CI scripts
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          git config user.name "quantum-m0-redteam-bot"
          git config user.email "quantum-m0-redteam-bot@users.noreply.github.com"
          git add -A
          git commit -m "M0: generate fail-closed R37 Windows CI scripts"
          git push \
            --force-with-lease=refs/heads/automation/m0-reconciliation-v4:"$EXPECTED_HEAD" \
            origin HEAD:automation/m0-reconciliation-v4
