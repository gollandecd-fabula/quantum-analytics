name: Build Two Quantum Installer Bundles R2

on:
  workflow_dispatch:
  push:
    branches:
      - local-installer-bundles-r2
    paths:
      - "scripts/windows/build_two_installer_bundles.ps1"
      - "scripts/windows/build_local_production.ps1"
      - "scripts/windows/install_home_local.ps1"
      - "scripts/windows/one_click_home_local.ps1"
      - "scripts/windows/import_source.ps1"
      - "scripts/windows/configure_home_local.ps1"
      - "src/**"
      - "requirements/windows-home-local.txt"
      - ".github/workflows/build-two-installer-bundles-r2.yml"
  pull_request:
    paths:
      - "scripts/windows/build_two_installer_bundles.ps1"
      - "scripts/windows/build_local_production.ps1"
      - "scripts/windows/install_home_local.ps1"
      - "scripts/windows/one_click_home_local.ps1"
      - "scripts/windows/import_source.ps1"
      - "scripts/windows/configure_home_local.ps1"
      - "src/**"
      - "requirements/windows-home-local.txt"
      - ".github/workflows/build-two-installer-bundles-r2.yml"

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Assert exact head
        shell: pwsh
        run: |
          $expected = "${{ github.event.pull_request.head.sha || github.sha }}"
          $actual = (& git rev-parse HEAD).Trim()
          if ($actual -ne $expected) {
            throw "Exact-head checkout failed. Expected $expected, got $actual"
          }

      - name: Set up Python 3.12 for package build
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Parse bundle builder
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "scripts/windows/build_two_installer_bundles.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            throw "Bundle builder PowerShell parse failed."
          }

      - name: Build two installer bundles
        shell: pwsh
        env:
          TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass `
            -File .\scripts\windows\build_two_installer_bundles.ps1 2>&1 |
            Tee-Object -FilePath installer-bundle-build.log
          if ($LASTEXITCODE -ne 0) {
            throw "Installer bundle build failed with exit code $LASTEXITCODE"
          }

      - name: Verify bundle contents, hashes and signatures
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $expectedHead = "${{ github.event.pull_request.head.sha || github.sha }}"
          $output = Resolve-Path "dist/installer-bundles-r2"
          $resultPath = Join-Path $output "installer-bundles-result.json"
          $result = Get-Content -LiteralPath $resultPath -Raw -Encoding UTF8 | ConvertFrom-Json
          if ([string]$result.source_commit -ne $expectedHead) {
            throw "Bundle source commit mismatch: $($result.source_commit)"
          }

          $continueZip = Join-Path $output "1_QUANTUM_CONTINUE_AND_FINISH.zip"
          $fullZip = Join-Path $output "2_QUANTUM_FULL_OFFLINE_INSTALLER.zip"
          foreach ($zip in @($continueZip, $fullZip)) {
            if (-not (Test-Path -LiteralPath $zip -PathType Leaf)) {
              throw "Missing installer bundle: $zip"
            }
          }
          if ((Get-FileHash -LiteralPath $continueZip -Algorithm SHA256).Hash.ToLowerInvariant() -ne [string]$result.continue_bundle.sha256) {
            throw "Continue bundle SHA-256 mismatch."
          }
          if ((Get-FileHash -LiteralPath $fullZip -Algorithm SHA256).Hash.ToLowerInvariant() -ne [string]$result.full_offline_bundle.sha256) {
            throw "Full offline bundle SHA-256 mismatch."
          }

          $continueRoot = Join-Path $env:RUNNER_TEMP "verify-continue-bundle"
          $fullRoot = Join-Path $env:RUNNER_TEMP "verify-full-bundle"
          Remove-Item -LiteralPath $continueRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $fullRoot -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -LiteralPath $continueZip -DestinationPath $continueRoot
          Expand-Archive -LiteralPath $fullZip -DestinationPath $fullRoot

          foreach ($required in @(
            (Join-Path $continueRoot "CONTINUE_AND_FINISH.cmd"),
            (Join-Path $continueRoot "CONTINUE_AND_FINISH.ps1"),
            (Join-Path $continueRoot "QuantumLocalProduction_HOME_LOCAL.zip"),
            (Join-Path $continueRoot "BUNDLE_MANIFEST.json"),
            (Join-Path $fullRoot "INSTALL_QUANTUM_FULL_OFFLINE.cmd"),
            (Join-Path $fullRoot "INSTALL_QUANTUM_FULL_OFFLINE.ps1"),
            (Join-Path $fullRoot "python-3.12.10-amd64.exe"),
            (Join-Path $fullRoot "QuantumLocalProduction_HOME_LOCAL.zip"),
            (Join-Path $fullRoot "BUNDLE_MANIFEST.json")
          )) {
            if (-not (Test-Path -LiteralPath $required -PathType Leaf)) {
              throw "Required bundle file is missing: $required"
            }
          }

          foreach ($script in @(
            (Join-Path $continueRoot "CONTINUE_AND_FINISH.ps1"),
            (Join-Path $fullRoot "INSTALL_QUANTUM_FULL_OFFLINE.ps1")
          )) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $script,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              throw "Generated PowerShell parse failed: $script"
            }
            $bytes = [IO.File]::ReadAllBytes($script)
            if (@($bytes | Where-Object { $_ -gt 127 }).Count -gt 0) {
              throw "Generated PowerShell entry script is not ASCII-safe: $script"
            }
          }

          $fullManifest = Get-Content -LiteralPath (Join-Path $fullRoot "BUNDLE_MANIFEST.json") -Raw -Encoding UTF8 | ConvertFrom-Json
          $pythonInstaller = Join-Path $fullRoot "python-3.12.10-amd64.exe"
          $pythonHash = (Get-FileHash -LiteralPath $pythonInstaller -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($pythonHash -ne [string]$fullManifest.python_installer_sha256) {
            throw "Bundled Python hash does not match bundle manifest."
          }
          if ($pythonHash -ne "67b5635e80ea51072b87941312d00ec8927c4db9ba18938f7ad2d27b328b95fb") {
            throw "Bundled Python hash is not the approved Python 3.12.10 x64 installer hash."
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $pythonInstaller
          if ([string]$signature.Status -ne "Valid") {
            throw "Bundled Python Authenticode signature is not valid: $($signature.Status)"
          }
          if ([string]$signature.SignerCertificate.Subject -notmatch "Python Software Foundation") {
            throw "Unexpected Python installer signer: $($signature.SignerCertificate.Subject)"
          }

          foreach ($root in @($continueRoot, $fullRoot)) {
            $manifest = Get-Content -LiteralPath (Join-Path $root "BUNDLE_MANIFEST.json") -Raw -Encoding UTF8 | ConvertFrom-Json
            $quantum = Join-Path $root "QuantumLocalProduction_HOME_LOCAL.zip"
            $actual = (Get-FileHash -LiteralPath $quantum -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -ne [string]$manifest.quantum_package_sha256) {
              throw "Quantum package hash mismatch in bundle: $root"
            }
          }

          Write-Host "Continue bundle SHA-256: $($result.continue_bundle.sha256)"
          Write-Host "Full offline bundle SHA-256: $($result.full_offline_bundle.sha256)"
          Write-Host "Python signature: $($signature.SignerCertificate.Subject)"

      - name: Upload build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: installer-bundles-r2-diagnostics
          path: |
            installer-bundle-build.log
            dist/installer-bundles-r2/installer-bundles-result.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload two installer files
        uses: actions/upload-artifact@v4
        with:
          name: Quantum-Two-Installer-Files-R2
          path: |
            dist/installer-bundles-r2/1_QUANTUM_CONTINUE_AND_FINISH.zip
            dist/installer-bundles-r2/2_QUANTUM_FULL_OFFLINE_INSTALLER.zip
            dist/installer-bundles-r2/installer-bundles-result.json
          if-no-files-found: error
          retention-days: 14
