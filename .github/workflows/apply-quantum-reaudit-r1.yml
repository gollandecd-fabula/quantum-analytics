name: Apply Quantum Reaudit R91 Temporary Runner

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply-exact-payload:
    if: >-
      github.event.pull_request.head.ref ==
      'tmp/quantum-reaudit-r91-stage'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout exact staging head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Assert exact staging head and apply fail-closed payload
        shell: bash
        env:
          EXPECTED_STAGING_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_STAGING_HEAD}"
          set +e
          python tools/apply_quantum_reaudit_r1.py 2>&1 | tee r91-apply.log
          code=${PIPESTATUS[0]}
          set -e
          exit "${code}"

      - name: Upload temporary runner diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: quantum-r91-temporary-runner-log
          path: r91-apply.log
          if-no-files-found: warn
          retention-days: 2
