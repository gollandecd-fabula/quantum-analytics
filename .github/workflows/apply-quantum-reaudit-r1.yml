name: Export Clean Quantum R91 Source

on:
  pull_request:
    types: [reopened]

permissions:
  contents: read

jobs:
  export-clean-source:
    if: >-
      github.event.pull_request.head.ref ==
      'tmp/quantum-reaudit-r91-stage'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout exact clean R91 head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Assert no staging infrastructure and archive source
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"
          test ! -e tools/apply_quantum_reaudit_r1.py
          test ! -e .github/workflows/apply-quantum-reaudit-r1.yml
          test -z "$(find tools -maxdepth 1 -type f -name 'reaudit_part_*.txt' -print -quit)"
          git ls-files -z | tar --null -T - -czf quantum-r91-clean-source.tar.gz
          sha256sum quantum-r91-clean-source.tar.gz > quantum-r91-clean-source.sha256

      - name: Upload clean R91 source
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: quantum-r91-clean-source
          path: |
            quantum-r91-clean-source.tar.gz
            quantum-r91-clean-source.sha256
          if-no-files-found: error
          retention-days: 2
