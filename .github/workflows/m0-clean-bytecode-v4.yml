name: M0 Clean Generated Bytecode V4

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: m0-clean-generated-bytecode-v4
  cancel-in-progress: false

jobs:
  clean:
    if: github.head_ref == 'automation/m0-reconciliation-v4'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Remove only tracked generated diagnostics and bytecode
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "automation/m0-reconciliation-v4"
          python - <<'PY'
          import subprocess
          tracked = subprocess.check_output(["git", "ls-files", "-z"]).decode().split("\0")
          bytecode = [p for p in tracked if p and ("/__pycache__/" in f"/{p}" or p.endswith(".pyc"))]
          diagnostic = [p for p in tracked if p == "m0-full-suite.log"]
          if not bytecode:
              raise SystemExit("No tracked generated Python bytecode found; refusing unexpected cleanup")
          if diagnostic != ["m0-full-suite.log"]:
              raise SystemExit(f"Expected exactly one tracked finalizer diagnostic, got {diagnostic}")
          targets = bytecode + diagnostic
          print(f"Removing {len(bytecode)} tracked bytecode files and {len(diagnostic)} diagnostic file")
          subprocess.run(["git", "rm", "-f", "--", *targets], check=True)
          PY
          git rm -f .github/workflows/m0-clean-bytecode-v4.yml

      - name: Re-run exact tests without writing bytecode
        id: exact_tests
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set +e
          {
            PYTHONPATH=src python -B -m unittest -v tests.test_m0_attestation_redteam
            first=$?
            if [ "$first" -eq 0 ]; then
              PYTHONPATH=src python -B -m unittest discover -s tests -p 'test_*.py'
              second=$?
            else
              second=0
            fi
            git diff --check
            third=$?
            tracked_generated="$(git ls-files | grep -E '(^|/)__pycache__/|\.pyc$|^m0-full-suite\.log$' || true)"
            if [ -n "$tracked_generated" ]; then
              echo "TRACKED_GENERATED_FILES_REMAIN"
              printf '%s\n' "$tracked_generated"
              fourth=1
            else
              fourth=0
            fi
            exit_code=$(( first || second || third || fourth ))
            echo "M0_CLEAN_EXIT_CODE=${exit_code}"
            exit "$exit_code"
          } > m0-clean-suite.log 2>&1
          status=$?
          tail -n 220 m0-clean-suite.log
          exit "$status"

      - name: Upload cleanup diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m0-clean-suite-diagnostic-${{ github.event.pull_request.head.sha }}
          path: m0-clean-suite.log
          if-no-files-found: error
          retention-days: 7

      - name: Remove temporary cleanup log
        if: success()
        shell: bash
        run: rm -f m0-clean-suite.log

      - name: Commit clean candidate
        shell: bash
        run: |
          set -euo pipefail
          test ! -e m0-clean-suite.log
          git config user.name "quantum-m0-redteam-bot"
          git config user.email "quantum-m0-redteam-bot@users.noreply.github.com"
          git add -A
          git commit -m "M0: remove generated diagnostics and Python bytecode"
          git push origin HEAD:automation/m0-reconciliation-v4
