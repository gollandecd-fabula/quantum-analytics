name: M0 Clean Generated Bytecode V4

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: m0-clean-generated-bytecode-v4
  cancel-in-progress: false

jobs:
  clean:
    if: github.head_ref == 'automation/m0-reconciliation-v4'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Remove only tracked generated Python bytecode
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "automation/m0-reconciliation-v4"
          python - <<'PY'
          from pathlib import Path
          import subprocess
          tracked = subprocess.check_output(["git", "ls-files", "-z"]).decode().split("\0")
          targets = [p for p in tracked if p and ("/__pycache__/" in f"/{p}" or p.endswith(".pyc"))]
          if not targets:
              raise SystemExit("No tracked generated Python bytecode found; refusing unexpected cleanup")
          print(f"Removing {len(targets)} tracked generated bytecode files")
          subprocess.run(["git", "rm", "-f", "--", *targets], check=True)
          PY
          git rm -f .github/workflows/m0-clean-bytecode-v4.yml

      - name: Re-run exact tests without writing bytecode
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail
          PYTHONPATH=src python -B -m unittest -v tests.test_m0_attestation_redteam
          PYTHONPATH=src python -B -m unittest discover -s tests -p 'test_*.py'
          git diff --check
          test -z "$(git ls-files | grep -E '(^|/)__pycache__/|\.pyc$' || true)"

      - name: Commit clean candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "quantum-m0-redteam-bot"
          git config user.email "quantum-m0-redteam-bot@users.noreply.github.com"
          git add -A
          git commit -m "M0: remove generated Python bytecode from reconciliation tree"
          git push origin HEAD:automation/m0-reconciliation-v4
