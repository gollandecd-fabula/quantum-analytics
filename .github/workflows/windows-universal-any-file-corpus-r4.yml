name: Windows Universal Any-File Corpus R4

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/windows-universal-any-file-corpus-r4.yml"
      - "scripts/windows/import_source.ps1"
      - "src/quantum/pilot/universal_gateway.py"
      - "src/quantum/pilot/universal_import.py"
      - "src/quantum/pilot/universal_intake.py"
      - "tests/test_universal_any_file_contract_r4.py"
      - "docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R33.json"

permissions:
  contents: read

jobs:
  python-corpus:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run deterministic universal corpus
        shell: pwsh
        run: |
          $expected = "${{ github.event.pull_request.head.sha || github.sha }}"
          if ((& git rev-parse HEAD).Trim() -ne $expected) {
            throw "Exact-head checkout failed."
          }
          $env:PYTHONPATH = Join-Path $PWD "src"
          python -m unittest tests.test_universal_any_file_contract_r4 -v
          if ($LASTEXITCODE -ne 0) { throw "Universal Python corpus failed." }

  native-front-door:
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - case_id: json-spoofed-xlsx
            expected_status: ACCEPTED_PARTIAL
            expected_exit: 0
          - case_id: cp1251-csv
            expected_status: ACCEPTED_PARTIAL
            expected_exit: 0
          - case_id: passive-pdf
            expected_status: ACCEPTED_PARTIAL
            expected_exit: 0
          - case_id: opaque-binary
            expected_status: ACCEPTED_UNPARSED
            expected_exit: 0
          - case_id: executable-spoofed-text
            expected_status: QUARANTINED_SECURITY
            expected_exit: 2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run native case ${{ matrix.case_id }}
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          [Text.Encoding]::RegisterProvider([Text.CodePagesEncodingProvider]::Instance)
          $expectedHead = "${{ github.event.pull_request.head.sha || github.sha }}"
          if ((& git rev-parse HEAD).Trim() -ne $expectedHead) {
            throw "Exact-head checkout failed."
          }

          $caseId = "${{ matrix.case_id }}"
          $expectedStatus = "${{ matrix.expected_status }}"
          $expectedExit = [int]"${{ matrix.expected_exit }}"
          $root = Join-Path $env:RUNNER_TEMP ("quantum-any-file-" + $caseId)
          $data = Join-Path $root "data"
          $output = Join-Path $root "output"
          New-Item -ItemType Directory -Path $root,$data,$output -Force | Out-Null

          switch ($caseId) {
            "json-spoofed-xlsx" {
              $name = "table.xlsx"
              $bytes = [Text.Encoding]::UTF8.GetBytes('[{"sku":"A","sales":1}]')
            }
            "cp1251-csv" {
              $name = "table.csv"
              $bytes = [Text.Encoding]::GetEncoding(1251).GetBytes("sku;sales`r`nA;1`r`n")
            }
            "passive-pdf" {
              $name = "document.pdf"
              $bytes = [Text.Encoding]::ASCII.GetBytes("%PDF-1.4`n%%EOF")
            }
            "opaque-binary" {
              $name = "opaque.bin"
              $bytes = [byte[]](0..63)
            }
            "executable-spoofed-text" {
              $name = "payload.txt"
              $bytes = [byte[]](77,90,48,48,48,48)
            }
            default { throw "Unknown corpus case: $caseId" }
          }

          $source = Join-Path $root $name
          $report = Join-Path $output ($name + ".json")
          [IO.File]::WriteAllBytes($source, $bytes)
          & powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\windows\import_source.ps1 `
            -File $source -StorageRoot $data -Output $report -NonInteractive `
            -AuthorityAttested -SchemaReviewed -SkipDefenderScan
          $actualExit = $LASTEXITCODE

          if ($actualExit -ne $expectedExit) {
            throw "Unexpected exit code for $caseId: $actualExit"
          }
          if (-not (Test-Path -LiteralPath $report -PathType Leaf)) {
            throw "Missing report for $caseId"
          }
          $payload = Get-Content -LiteralPath $report -Raw -Encoding UTF8 | ConvertFrom-Json
          if ([string]$payload.status -ne $expectedStatus) {
            throw "Unexpected status for $caseId: $($payload.status)"
          }
          if ($null -ne $payload.calculation) {
            throw "Non-XLSX case produced a calculation: $caseId"
          }
          if ([bool]$payload.marketplace_write_enabled) {
            throw "Marketplace writes enabled for $caseId"
          }
          Write-Host "WINDOWS_UNIVERSAL_CASE_PASS: $caseId" -ForegroundColor Green
          exit 0
