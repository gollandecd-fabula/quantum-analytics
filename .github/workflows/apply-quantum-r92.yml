name: Apply Quantum R92 Exact Patch

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  apply-exact-r92:
    if: >-
      github.event.pull_request.head.ref == 'tmp/quantum-r92-stage'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout exact staging head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'

      - name: Verify, apply and test exact R92 payload
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${EXPECTED_HEAD}"
          set +e
          python tools/apply_r92_exact.py 2>&1 | tee r92-apply.log
          code=${PIPESTATUS[0]}
          set -e
          exit "${code}"

      - name: Upload R92 apply diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: quantum-r92-apply-log
          path: r92-apply.log
          if-no-files-found: warn
          retention-days: 2
