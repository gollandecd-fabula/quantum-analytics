name: Apply HOME_LOCAL Red-Team Patch

on:
  pull_request:
    types:
      - synchronize
    paths:
      - '.github/workflows/apply-redteam-patch.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout staging head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Assert branch and exact head
        shell: bash
        run: |
          set -euo pipefail
          test "${{ github.event.pull_request.head.ref }}" = "local-pilot-windows-acl-repair-r2"
          expected="${{ github.event.pull_request.head.sha }}"
          test "$(git rev-parse HEAD)" = "${expected}"

      - name: Apply verified bundle
        shell: bash
        run: |
          set -euo pipefail
          python3 .redteam_patch/apply.py

      - name: Compile and run focused regressions
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONPATH=src
          python3 -m py_compile \
            src/quantum/pilot/local_runner.py \
            src/quantum/pilot/windows_runner.py \
            tests/test_windows_redteam_hardening.py
          python3 -m unittest \
            tests.test_windows_redteam_hardening \
            tests.test_windows_local_runner \
            tests.test_windows_storage_compat \
            tests.test_local_pilot_runner \
            -v

      - name: Remove staging bundle
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .redteam_patch

      - name: Commit hardened tree to isolated output branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "quantum-redteam-bot"
          git config user.email "quantum-redteam-bot@users.noreply.github.com"
          git add -A
          test -n "$(git status --porcelain)"
          git commit -m "Red-team harden HOME_LOCAL onboarding and integrity"
          git push origin HEAD:refs/heads/local-pilot-windows-redteam-output-r3-2f125986
          echo "HARDENED_COMMIT=$(git rev-parse HEAD)"
