name: Prepare HOME_LOCAL Red-Team Tree

on:
  pull_request:
    types:
      - synchronize
    paths:
      - '.github/workflows/apply-redteam-patch.yml'

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout staging head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Assert branch and exact head
        shell: bash
        run: |
          set -euo pipefail
          test "${{ github.event.pull_request.head.ref }}" = "local-pilot-windows-acl-repair-r2"
          expected="${{ github.event.pull_request.head.sha }}"
          test "$(git rev-parse HEAD)" = "${expected}"

      - name: Apply verified bundle
        shell: bash
        run: |
          set -euo pipefail
          python3 .redteam_patch/apply.py

      - name: Compile and run focused regressions
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONPATH=src
          python3 -m py_compile \
            src/quantum/pilot/local_runner.py \
            src/quantum/pilot/windows_runner.py \
            tests/test_windows_redteam_hardening.py
          python3 -m unittest \
            tests.test_windows_redteam_hardening \
            tests.test_windows_local_runner \
            tests.test_windows_storage_compat \
            tests.test_local_pilot_runner \
            -v

      - name: Prepare final staged tree metadata
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .redteam_patch
          rm -f .github/workflows/apply-redteam-patch.yml
          git add -A
          git diff --cached --check
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          def git(*args: str) -> str:
              return subprocess.check_output(['git', *args], text=True).strip()

          changed = [
              line.split('\t', 1)[-1]
              for line in git('diff', '--cached', '--name-status').splitlines()
              if line.strip()
          ]
          payload = {
              'parent_sha': git('rev-parse', 'HEAD'),
              'base_tree_sha': git('rev-parse', 'HEAD^{tree}'),
              'bundle_json_sha256': '7d0a997f504d8d6e3c4b70b80018c5992b25f38e45b8ad606d5327e0106c0589',
              'changed_paths': changed,
          }
          Path('redteam-tree-metadata.json').write_text(
              json.dumps(payload, sort_keys=True, indent=2) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(payload, sort_keys=True))
          PY

      - name: Upload final tree metadata
        uses: actions/upload-artifact@v4
        with:
          name: HOME_LOCAL-redteam-tree-metadata
          path: redteam-tree-metadata.json
          if-no-files-found: error
          retention-days: 7
