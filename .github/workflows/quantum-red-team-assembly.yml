name: Quantum Red Team Assembly

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quantum-red-team-assembly
  cancel-in-progress: false

jobs:
  assemble-test-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout exact temporary branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Reconstruct audited files and verify hashes
        shell: bash
        run: |
          set -euo pipefail
          cat .quantum-staging/local_pilot.b64.* | base64 --decode > src/quantum/api/local_pilot.py
          cat .quantum-staging/test_local_pilot.b64.* | base64 --decode > tests/test_local_pilot_one_click.py
          cat > /tmp/quantum-sha256.txt <<'EOF'
          a659bd5ef8afd0f39ca9623603d93772e2f69df4600f7c1c506051ecb91b4519  src/quantum/api/local_pilot.py
          dbe9a1bea8a0c2093421bba33ea7b7b90ca79dbc748322c6f74d0114c33e6b8e  tests/test_local_pilot_one_click.py
          be19c1421f1debefac5b78e6018baa7d160b281c763005d1f85acbcae272b9d1  src/quantum/api/local_pilot_server.py
          cf76a373cbf0bed7358bff40e60155dafc93819c1d11c5ebffcf8aee6e54e124  scripts/quantum_windows_exe_entry.py
          15a5fc8d51cc54dcdb3eb62b7ca1824ff6639f244026d91a96451ca602923f36  docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R19.json
          EOF
          sha256sum --check /tmp/quantum-sha256.txt
          rm -rf .quantum-staging
          rm -f .github/workflows/quantum-red-team-assembly.yml
          git add -A
          git diff --cached --check

      - name: Run exact full gate and repeated Red Team tests
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/quantum-red-team-ci.log
          PYTHONPATH=src python3 -m quantum.scripts.ci 2>&1 | tee -a /tmp/quantum-red-team-ci.log
          for run in 1 2 3; do
            echo "TARGETED_RED_TEAM_RUN=${run}" | tee -a /tmp/quantum-red-team-ci.log
            PYTHONPATH=src python3 tests/test_local_pilot_one_click.py 2>&1 | tee -a /tmp/quantum-red-team-ci.log
          done

      - name: Commit verified atomic patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Stabilize local pilot red-team boundaries"
          git push origin HEAD:fix/quantum-one-click-stable-release
          git rev-parse HEAD | tee /tmp/quantum-final-sha.txt

      - name: Upload verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: quantum-red-team-stabilization-evidence
          path: |
            /tmp/quantum-red-team-ci.log
            /tmp/quantum-final-sha.txt
            /tmp/quantum-sha256.txt
          if-no-files-found: error
