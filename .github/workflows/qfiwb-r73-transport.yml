name: Quantum R73 Patch Transport

on:
  push:
    branches:
      - automation/qfiwb-r73-transport

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reconstruct and verify patch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: "85"
          NONCE: "QFIWB_R73_1277a410"
          ZIP_SHA256: "1277a4106bf7201270b92f96d72af5d506fba63ab8ae282e6b0207c757aeee7a"
          ZIP_SIZE: "37135"
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import json
          import os
          from pathlib import Path, PurePosixPath
          import urllib.request
          from zipfile import ZipFile

          repo = os.environ["REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          pr = os.environ["PR_NUMBER"]
          nonce = os.environ["NONCE"]
          expected_zip_sha = os.environ["ZIP_SHA256"]
          expected_zip_size = int(os.environ["ZIP_SIZE"])
          marker = "QUANTUM_PATCH_TRANSPORT_V1"
          total = 5
          parts = {}
          page = 1
          while True:
              url = f"https://api.github.com/repos/{repo}/issues/{pr}/comments?per_page=100&page={page}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  comments = json.load(response)
              if not comments:
                  break
              for comment in comments:
                  body = comment.get("body") or ""
                  header, separator, payload = body.partition("\n")
                  fields = header.split("|")
                  if not separator or len(fields) != 6 or fields[0] != marker or fields[1] != nonce:
                      continue
                  index = int(fields[2])
                  if int(fields[3]) != total or fields[4] != expected_zip_sha or int(fields[5]) != expected_zip_size:
                      raise SystemExit("TRANSPORT_METADATA_MISMATCH")
                  if index < 1 or index > total or index in parts:
                      raise SystemExit("TRANSPORT_DUPLICATE_OR_INVALID_INDEX")
                  parts[index] = payload.strip()
              if len(comments) < 100:
                  break
              page += 1
          if set(parts) != set(range(1, total + 1)):
              raise SystemExit(f"TRANSPORT_PARTS_MISSING:{sorted(parts)}")
          encoded = "".join(parts[index] for index in range(1, total + 1))
          try:
              archive_bytes = base64.b64decode(encoded, validate=True)
          except Exception as exc:
              raise SystemExit("TRANSPORT_BASE64_INVALID") from exc
          if len(archive_bytes) != expected_zip_size:
              raise SystemExit("TRANSPORT_ZIP_SIZE_MISMATCH")
          if hashlib.sha256(archive_bytes).hexdigest() != expected_zip_sha:
              raise SystemExit("TRANSPORT_ZIP_SHA_MISMATCH")

          expected = {
              "scripts/windows/install_home_local.ps1": (22158, "25e27d0134131c2118d4dacdfc3eaffa79d671d400c8b2ee854d82252e2e094a"),
              "src/quantum/application/desktop_center.py": (1800, "f44d7705b101e29d64ec3f572ff6e70af2cbe6374f880d019102b5795d2d8a79"),
              "src/quantum/application/finance_center.py": (48817, "054bdb8c500755843dc21656b122e38d6984f604727c0c20c794b1a00fcfbc20"),
              "src/quantum/application/finance_profile.py": (54292, "2b4beb203c869ab3bf250682f24dfa0026b694183e4d041a60f28b4bbe051633"),
              "tests/integration_manifest_support_m8.py": (1090, "ad8fe58586e4808daf693c84f41695318f08e07b0c8603388e3118acc5fd4a84"),
              "tests/test_finance_center_profile.py": (12928, "8133ccde7cffce34d461aa8406a975d0b074c1fbc353777f847363eb4910e027"),
              "docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R73.json": (1537, "9c78a514a4b2e48b02c57163625d97835971cac6095a7bbabc1bab83686bed65"),
          }
          destination = Path("/tmp/qfiwb_patch")
          destination.mkdir(parents=True, exist_ok=True)
          archive_path = destination / "patch.zip"
          archive_path.write_bytes(archive_bytes)
          with ZipFile(archive_path) as archive:
              names = archive.namelist()
              if len(names) != len(set(names)) or set(names) != set(expected):
                  raise SystemExit("TRANSPORT_ZIP_MEMBERS_MISMATCH")
              for name in names:
                  pure = PurePosixPath(name)
                  if pure.is_absolute() or ".." in pure.parts or "." in pure.parts:
                      raise SystemExit("TRANSPORT_UNSAFE_PATH")
                  payload = archive.read(name)
                  size, digest = expected[name]
                  if len(payload) != size or hashlib.sha256(payload).hexdigest() != digest:
                      raise SystemExit(f"TRANSPORT_FILE_MISMATCH:{name}")
                  output = destination / name
                  output.parent.mkdir(parents=True, exist_ok=True)
                  output.write_bytes(payload)
          print("QFIWB_TRANSPORT_VERIFIED")
          PY
      - name: Apply, test and publish one commit
        env:
          TARGET_BRANCH: "fix/quantum-one-click-stable-release"
          EXPECTED_PARENT: "fd203b921216ca673d818b0a438047b18360e821"
          TEMP_BRANCH: "automation/qfiwb-r73-transport"
          REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin "$TARGET_BRANCH"
          actual_parent="$(git rev-parse "origin/$TARGET_BRANCH")"
          test "$actual_parent" = "$EXPECTED_PARENT" || { echo "TARGET_HEAD_MOVED:$actual_parent"; exit 1; }
          git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          python - <<'PY'
          from pathlib import Path
          import shutil
          source = Path("/tmp/qfiwb_patch")
          paths = [
              "scripts/windows/install_home_local.ps1",
              "src/quantum/application/desktop_center.py",
              "src/quantum/application/finance_center.py",
              "src/quantum/application/finance_profile.py",
              "tests/integration_manifest_support_m8.py",
              "tests/test_finance_center_profile.py",
              "docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R73.json",
          ]
          for relative in paths:
              target = Path(relative)
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copyfile(source / relative, target)
          PY
          PYTHONPATH=src python -m compileall -q \
            src/quantum/application/desktop_center.py \
            src/quantum/application/finance_center.py \
            src/quantum/application/finance_profile.py
          PYTHONPATH=src:. python -m unittest -v tests.test_finance_center_profile
          python - <<'PY'
          import subprocess
          expected = {
              "scripts/windows/install_home_local.ps1",
              "src/quantum/application/desktop_center.py",
              "src/quantum/application/finance_center.py",
              "src/quantum/application/finance_profile.py",
              "tests/integration_manifest_support_m8.py",
              "tests/test_finance_center_profile.py",
              "docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R73.json",
          }
          actual = set(subprocess.check_output(["git", "diff", "--name-only"], text=True).splitlines())
          if actual != expected:
              raise SystemExit(f"DIFF_SCOPE_MISMATCH:{sorted(actual)}")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/windows/install_home_local.ps1 \
            src/quantum/application/desktop_center.py \
            src/quantum/application/finance_center.py \
            src/quantum/application/finance_profile.py \
            tests/integration_manifest_support_m8.py \
            tests/test_finance_center_profile.py \
            docs/evidence/ARTIFACT_MANIFEST_OVERLAY_PILOT_INTEGRATION_R73.json
          git commit -m "Add WB finance center and grouped cost workflow"
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"
          python - <<'PY'
          import os
          import urllib.parse
          import urllib.request
          repo = os.environ["REPOSITORY"]
          branch = urllib.parse.quote(os.environ["TEMP_BRANCH"], safe="")
          token = os.environ["GITHUB_TOKEN"]
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/git/refs/heads/{branch}",
              method="DELETE",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              urllib.request.urlopen(request, timeout=30).read()
          except Exception as exc:
              print(f"TEMP_BRANCH_CLEANUP_WARNING:{type(exc).__name__}")
          PY
