name: Temporary Source Export For Repair

on:
  push:
    branches:
      - fix/quantum-one-click-stable-release
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record exact head
        run: git rev-parse HEAD > EXACT_HEAD.txt
      - name: Create source archive
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile
          root = Path('.').resolve()
          output = root / 'quantum-source-export.zip'
          excluded = {'.git', '.venv', '__pycache__', 'dist'}
          with ZipFile(output, 'w', ZIP_DEFLATED) as archive:
              for path in sorted(root.rglob('*')):
                  if not path.is_file() or path == output:
                      continue
                  relative = path.relative_to(root)
                  if any(part in excluded for part in relative.parts):
                      continue
                  archive.write(path, relative.as_posix())
          PY
      - name: Upload exact source
        uses: actions/upload-artifact@v4
        with:
          name: quantum-source-export
          path: |
            quantum-source-export.zip
            EXACT_HEAD.txt
          if-no-files-found: error
          retention-days: 1
