name: Conflict
description: Authority or requirement conflict
title: "[CONFLICT] "
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
    validations:
      required: true
  - type: textarea
    id: inputs
    attributes:
      label: Inputs
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk class
      options:
        - R0
        - R1
        - R2
        - R3
        - R4
    validations:
      required: true
